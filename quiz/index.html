<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Descubra seu código instalado · Método Cálice</title>
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Jost:wght@400;500;600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  /* Tokens reais do tema "Santuário + Véu" (Método Cálice) — ver
     .claude/skills/quiz-funnel-designer/references/visual-identity-serena.md */
  :root {
    --bg: #faf6fb;
    --veil-0: #fdfcfe;
    --veil-1: #faf6fb;
    --veil-2: #f7efe3;
    --ink: #453d57;
    --accent: #8a6d3e;
    --gold: #d9a854;
    --gold-soft: #e7c77a;
    --surface: #ffffff;
    --surface-dark-1: #2b1e42;
    --surface-dark-2: #4a2e63;
    --surface-dark-fg: #fbf6f0;
    --glass: rgba(255, 255, 255, .62);
    --glass-strong: rgba(255, 255, 255, .82);
    --glass-border: rgba(255, 255, 255, .9);
    --shadow-tint: rgba(155, 130, 200, .4);
    --lavender: #c9bbe8;
    --error: #b3453f;
    --font-display: 'Cormorant Garamond', Georgia, serif;
    --font-label: 'Jost', sans-serif;
    --font-ui: 'Manrope', -apple-system, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: var(--font-ui);
    color: var(--ink);
    background: linear-gradient(170deg, var(--veil-0) 0%, var(--veil-1) 55%, var(--veil-2) 100%);
    background-attachment: fixed;
    line-height: 1.55;
  }
  #app { min-height: 100vh; min-height: 100dvh; display: flex; flex-direction: column; }

  /* ---------- barra de progresso (fixa no topo; outline fica na trilha em si, não numa linha divisória) ---------- */
  .progress-shell {
    position: fixed; top: 0; left: 0; right: 0; z-index: 10;
    padding: 16px 20px 14px;
    background: linear-gradient(170deg, var(--veil-0) 0%, var(--veil-1) 100%);
    transition: opacity .2s ease;
  }
  /* escondida no hook (step 0) e nos cards de transição (pausas honestas + virada de
     esperança) — não fazem parte da contagem das 8 perguntas, a barra ali confundia */
  .progress-shell.is-hidden { opacity: 0; pointer-events: none; }
  /* trava a largura da trilha no mesmo max-width do conteúdo (.wrap) — em telas
     largas a barra esticada ponta-a-ponta perdia relação visual com o resto */
  .progress-inner { max-width: 480px; margin: 0 auto; }
  .progress-track {
    height: 6px; background: var(--glass); border: 1px solid var(--glass-border);
    border-bottom: 2px solid rgba(154, 130, 200, .38);
    border-radius: 999px; overflow: hidden;
  }
  .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--gold), var(--gold-soft)); transition: width .3s ease; }
  .progress-count { font-family: var(--font-label); font-size: 12px; letter-spacing: .03em; color: var(--accent); margin: 8px 2px 0; }

  /* ---------- footer legal (fixo embaixo, discreto) ---------- */
  .legal-footer {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 10;
    text-align: center; padding: 10px 20px;
    font-family: var(--font-label); font-size: 11px; color: var(--ink); opacity: .5; letter-spacing: .01em;
    background: linear-gradient(0deg, var(--veil-2) 55%, rgba(247,239,227,0) 100%);
  }

  /* ---------- zona de conteúdo: entre a barra fixa no topo e o footer fixo embaixo, sempre centralizada ---------- */
  #steps { flex: 1; display: flex; flex-direction: column; padding-top: 60px; padding-bottom: 50px; overflow-y: auto; }
  [data-step] { display: none; flex: 1; }
  [data-step].is-active { display: flex; }
  /* entrada: fade + leve subida. saída: só fade, mais rápido (a troca real de
     step só acontece depois que a saída termina — ver goToStep no JS) */
  [data-step].is-enter { animation: step-in .45s cubic-bezier(.16,1,.3,1); }
  [data-step].is-leaving { opacity: 0; transition: opacity .16s ease; }
  @keyframes step-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @media (prefers-reduced-motion: reduce) {
    [data-step].is-enter { animation: none; }
    [data-step].is-leaving { transition: none; }
  }

  .wrap {
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    padding: 28px 20px 44px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    flex: 1;
  }
  .eyebrow { font-family: var(--font-label); font-size: 13px; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: .06em; margin: 0 0 12px; }
  /* revelação parcial: mesma frase do resultado ("X, seu código instalado é:"), serifada
     itálica pra não ficar burocrático como as outras eyebrows (Processando, tags) */
  #revealEyebrow { font-family: var(--font-display); font-style: italic; font-weight: 600; font-size: 18px; text-transform: none; letter-spacing: 0; }
  /* h1 = momento curto/emocional (abertura, nome do arquétipo) → serifada.
     h2 = frase longa que precisa ser lida rápido (pergunta, prompt de captura) → sans,
     mais peso, mais entrelinha. Serifada em frase comprida lê bonito mas lento — regra
     registrada em references/visual-identity-serena.md. */
  h1 { font-family: var(--font-display); font-weight: 700; font-size: 31px; line-height: 1.22; margin: 0 0 14px; color: var(--ink); }
  h1 em { font-style: italic; color: var(--accent); }
  h2 { font-family: var(--font-display); font-weight: 700; font-size: 24px; line-height: 1.42; margin: 0 0 20px; }
  /* títulos das perguntas (steps de seleção): serifada ficou pesada/lenta pra leitura
     rápida de frase comprida — sans, mais peso, mais entrelinha, como a regra original
     de h2 já previa (ver comentário acima) */
  h2.q-title { font-family: var(--font-ui); font-weight: 700; font-size: 20px; line-height: 1.48; }
  /* nome/e-mail: serifada já no peso máximo carregado (700) — o stroke fino reforça
     a massa da letra sem trocar de fonte nem cair em negrito sintético */
  h2.cap-title { -webkit-text-stroke: .4px currentColor; }
  p.lead { font-family: var(--font-ui); font-size: 16px; color: var(--ink); opacity: .78; margin: 0 0 28px; }
  /* subheadline de dor (logo abaixo do h1) — mais peso pra não competir em silêncio com o h1 */
  p.lead.lead-strong { font-weight: 600; opacity: .94; }
  /* highlight pontual em texto corrido */
  .mark { font-weight: 700; color: var(--accent); }

  /* ---------- placeholder de imagem (explícito, nunca vazio/genérico) ---------- */
  .img-placeholder {
    position: relative;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 6px;
    width: 100%;
    border-radius: 22px;
    border: 1.5px dashed var(--lavender);
    background: var(--glass);
    color: var(--accent);
    text-align: center;
    padding: 18px;
    margin: 0 0 26px;
    overflow: hidden;
  }
  .img-placeholder .glow { position: absolute; inset: -30% -10% auto -10%; height: 140%; background: radial-gradient(circle, rgba(201,187,232,.5), transparent 65%); pointer-events: none; }
  .img-placeholder span.ico { font-size: 30px; }
  .img-placeholder small { font-family: var(--font-label); font-size: 12px; opacity: .75; max-width: 260px; }
  .img-hero { aspect-ratio: 3/4; max-width: 176px; margin: 0 auto 22px; }
  /* moldura pra mídia final (não placeholder) — mesmo espírito do dashed dos
     placeholders, mas em dourado: intencional/decorativo, não "provisório" */
  .media-frame {
    max-width: 176px;
    margin: 0 auto 22px;
    padding: 5px;
    border: 1.5px dashed var(--gold);
    border-radius: 24px;
  }
  .media-frame img { display: block; width: 100%; border-radius: 20px; }
  .img-badge, .result-orb { aspect-ratio: 3/4; }
  .img-badge img, .result-orb img { height: 100%; object-fit: cover; }
  .img-badge { max-width: 208px; margin: 0 auto 24px; }
  .img-cover { aspect-ratio: 3/4; max-width: 220px; margin: 0 auto 28px; }
  .img-envelope { aspect-ratio: 1/1; max-width: 140px; margin: 0 auto 22px; }

  /* ---------- pausas honestas / virada de esperança: bloco tipo citação, não texto solto ---------- */
  .bridge-card {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    padding: 28px 22px 24px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    box-shadow: 0 14px 30px -20px var(--shadow-tint);
    margin: 0 0 22px;
  }
  .bridge-img { width: 148px; height: 148px; margin: 0 auto 20px; padding: 4px; border-radius: 9999px; }
  .bridge-img .ico { font-size: 56px; }
  .bridge-img img { width: 100%; height: 100%; object-fit: cover; border-radius: 9999px; }
  .bridge-quote {
    font-family: var(--font-display);
    font-style: italic;
    font-weight: 600;
    font-size: 21px;
    line-height: 1.5;
    color: var(--ink);
    margin: 0;
  }

  /* ---------- loading do resultado: anel de progresso circular (0%→100% no centro) + frases ---------- */
  .loading-ring-wrap { position: relative; width: 128px; height: 128px; margin: 0 auto 22px; }
  .loading-ring { position: relative; width: 100%; height: 100%; transform: rotate(-90deg); }
  .loading-ring-track { fill: none; stroke: var(--glass); stroke-width: 8; }
  .loading-ring-fill {
    fill: none; stroke: url(#loadingRingGrad); stroke-width: 8; stroke-linecap: round;
    stroke-dasharray: 339.292; stroke-dashoffset: 339.292;
  }
  .loading-percent {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display); font-weight: 600; font-size: 34px; color: var(--ink);
  }
  .loading-phrase {
    font-family: var(--font-display); font-style: italic; font-weight: 500; font-size: 17px;
    color: var(--ink); opacity: .82;
    min-height: 24px; margin: 0 0 4px; transition: opacity .22s ease;
  }
  .loading-phrase.is-swapping { opacity: 0; }

  /* ---------- opções de quiz (glass card + emoji) ---------- */
  .option {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    text-align: left;
    padding: 15px 16px;
    margin-bottom: 11px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    box-shadow: 0 8px 20px -16px var(--shadow-tint);
    font-family: var(--font-ui);
    font-size: 15px;
    color: var(--ink);
    cursor: pointer;
    transition: border-color .15s ease, background .15s ease, transform .1s ease;
  }
  .option:hover { border-color: var(--gold); background: var(--glass-strong); }
  .option:active { transform: scale(.98); }
  .option .emoji { font-size: 20px; flex: 0 0 auto; }
  /* ---------- botão primário (card de contraste, nunca preto genérico) ---------- */
  .btn {
    display: block;
    width: 100%;
    padding: 16px 20px;
    text-align: center;
    background: linear-gradient(160deg, var(--surface-dark-1), var(--surface-dark-2));
    color: var(--surface-dark-fg);
    font-family: var(--font-label);
    font-size: 15.5px;
    font-weight: 600;
    letter-spacing: .01em;
    border: 0;
    border-radius: 9999px;
    text-decoration: none;
    cursor: pointer;
    box-sizing: border-box;
    box-shadow: 0 12px 26px -14px var(--shadow-tint);
    transition: transform .12s ease, box-shadow .12s ease;
  }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 16px 30px -14px var(--shadow-tint); }
  .btn:active { transform: translateY(0) scale(.99); }
  .btn-narrow { width: auto; min-width: 250px; max-width: 340px; margin: 0 auto; }
  .btn-pulse { animation: btn-pulse-soft 2.6s ease-in-out infinite; }
  .btn-pulse:hover { animation-play-state: paused; }
  @keyframes btn-pulse-soft { 0%, 100% { transform: scale(1); box-shadow: 0 12px 26px -14px var(--shadow-tint); } 50% { transform: scale(1.03); box-shadow: 0 16px 32px -14px var(--shadow-tint); } }

  /* ---------- captura ---------- */
  .field { margin-bottom: 16px; }
  .label { display: block; font-family: var(--font-label); font-size: 13.5px; font-weight: 600; margin-bottom: 7px; color: var(--ink); }
  .input {
    width: 100%;
    padding: 14px 15px;
    font-family: var(--font-ui);
    font-size: 16px;
    border: 1.5px solid var(--glass-border);
    background: var(--surface);
    border-radius: 13px;
    outline: none;
    box-sizing: border-box;
  }
  .input:focus { border-color: var(--gold); }
  .input.invalid { border-color: var(--error); background: #fdf3f2; }
  [data-email-msg] { display: none; font-family: var(--font-label); font-size: 12px; color: var(--error); margin-top: 7px; }
  [data-email-msg].show { display: block; }
  [data-email-suggestion] { display: none; font-family: var(--font-label); font-size: 13px; color: var(--ink); opacity: .75; margin-top: 8px; }
  [data-email-suggestion].show { display: block; }
  [data-email-suggestion] button { background: none; border: 0; padding: 0; font: inherit; font-weight: 700; color: var(--accent); text-decoration: underline; cursor: pointer; }
  .disclaimer { font-family: var(--font-label); font-size: 10.5px; color: var(--ink); opacity: .6; margin: -6px 0 18px; }

  /* ---------- loading ---------- */
  .center { text-align: center; }

  /* ---------- resultado ---------- */
  .result-orb {
    max-width: 152px; margin: 0 auto 20px;
    box-shadow: 0 14px 28px -18px var(--shadow-tint);
    animation: float-slow 7s ease-in-out infinite;
  }
  @keyframes float-slow { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }
  @media (prefers-reduced-motion: reduce) { .result-orb { animation: none; } }
  .result-card {
    background: linear-gradient(160deg, rgba(43,30,66,.94), rgba(74,46,99,.88));
    color: var(--surface-dark-fg);
    border-radius: 20px;
    padding: 22px 22px 4px;
    margin-bottom: 22px;
    box-shadow: 0 20px 40px -22px var(--shadow-tint);
  }
  .result-tag { display: inline-block; font-family: var(--font-display); font-style: italic; font-weight: 600; font-size: 17px; color: var(--gold-soft); margin-bottom: 10px; }
  .result-lead { font-family: var(--font-ui); font-size: 15.5px; color: var(--surface-dark-fg); opacity: .85; margin: 0 0 4px; }
  .result-archetype { font-family: var(--font-display); font-weight: 700; font-style: italic; font-size: 27px; line-height: 1.25; color: var(--surface-dark-fg); margin: 0 0 16px; }
  .result-body p { margin: 0 0 16px; font-size: 15.5px; color: var(--surface-dark-fg); opacity: .92; }

  /* ---------- mobile-first: ajustes pra telas estreitas (iPhone SE/mini, ~360-390px) ---------- */
  @media (max-width: 380px) {
    .progress-shell { padding: 14px 16px 12px; }
    #steps { padding-top: 52px; padding-bottom: 46px; }
    .wrap { padding: 22px 16px 34px; }
    h1 { font-size: 26px; }
    h2 { font-size: 21px; }
    h2.q-title { font-size: 18px; }
    .img-hero { max-width: 148px; }
    .media-frame { max-width: 148px; }
    .btn { padding: 14px 18px; font-size: 15px; }
    .btn-narrow { min-width: 210px; }
    .bridge-card { padding: 24px 18px 20px; }
    .bridge-quote { font-size: 19px; }
    .bridge-img { width: 116px; height: 116px; }
    .loading-ring-wrap { width: 108px; height: 108px; }
    .img-badge { max-width: 160px; }
    .result-orb { max-width: 116px; }
  }
</style>
</head>
<body>
<div id="app">
  <div class="progress-shell">
    <div class="progress-inner">
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    </div>
  </div>
  <div id="steps"></div>
  <footer class="legal-footer">Método Cálice · Política de Privacidade · Termos de Uso</footer>
</div>

<script>
(function () {
  'use strict';

  // ---------- Dados: as 8 perguntas (copy da Ge, ordem de opção fixa: Aprovador · Sabotador · Ausente · Controlador) ----------
  // Emoji escolhido por CONTEÚDO de cada opção (não por posição/arquétipo) — ver
  // convenção "emoji por opção" em references/visual-identity-serena.md
  var QUESTIONS = [
    {
      texto: 'Quando alguém te pede algo que você não quer fazer, você normalmente:',
      opcoes: [
        { texto: 'Diz sim pra não decepcionar', emoji: '🤝' },
        { texto: 'Fica procrastinando até a situação se resolver sozinha', emoji: '⏳' },
        { texto: 'Faz no automático, sem nem pensar se quer ou não', emoji: '🤖' },
        { texto: 'Analisa muito antes de responder pra não perder o controle', emoji: '🧠' }
      ]
    },
    {
      texto: 'Quando está muito perto de alcançar algo importante, o que acontece?',
      opcoes: [
        { texto: 'Me preocupo com o que os outros vão achar', emoji: '👀' },
        { texto: 'Começo a me perguntar se mereço realmente', emoji: '❓' },
        { texto: 'Percebo que nem sei mais o que queria de verdade', emoji: '🌫️' },
        { texto: 'A ansiedade bate e eu começo a controlar cada detalhe', emoji: '🎯' }
      ]
    },
    {
      texto: 'Qual dessas frases mais soa como sua voz interna?',
      opcoes: [
        { texto: '"Não quero criar conflito."', emoji: '🕊️' },
        { texto: '"Não sou suficiente pra isso."', emoji: '💭' },
        { texto: '"Não sei bem o que eu sinto sobre isso."', emoji: '🌀' },
        { texto: '"E se der errado?"', emoji: '⚠️' }
      ]
    },
    {
      texto: 'Quando recebe um elogio genuíno, você:',
      opcoes: [
        { texto: 'Fica feliz mas logo pensa "será que foi sincero?"', emoji: '🤔' },
        { texto: 'Desvia o assunto ou minimiza', emoji: '🙈' },
        { texto: 'Sente pouca coisa, como se não chegasse até você', emoji: '🫥' },
        { texto: 'Aceita mas já começa a se cobrar pra manter o padrão', emoji: '📈' }
      ]
    },
    {
      texto: 'Como é sua relação com mudança?',
      opcoes: [
        { texto: 'Quero, mas sempre depende do que as pessoas próximas vão achar', emoji: '👥' },
        { texto: 'Quero, mas sempre aparece um motivo pra adiar', emoji: '🚧' },
        { texto: 'Às vezes nem percebo que algo precisa mudar', emoji: '😶' },
        { texto: 'Só mudo quando tenho controle total do processo', emoji: '🗺️' }
      ]
    },
    {
      texto: 'No final de um dia comum, você geralmente sente:',
      opcoes: [
        { texto: 'Que fez tudo pelos outros mas esqueceu de você', emoji: '💔' },
        { texto: 'Um vazio difícil de nomear', emoji: '🕳️' },
        { texto: 'Que devia ter feito mais, aproveitado mais', emoji: '⏰' },
        { texto: 'Que as coisas não saíram exatamente como planejou', emoji: '📋' }
      ]
    },
    {
      texto: 'Qual palavra mais descreve como você se sente quando pensa na sua vida hoje?',
      opcoes: [
        { texto: 'Sem energia', emoji: '🪫' },
        { texto: 'Sem rumo', emoji: '🧭' },
        { texto: 'Sem saída', emoji: '🔒' },
        { texto: 'Sem paz', emoji: '🌪️' }
      ]
    },
    {
      texto: 'Quando imagina ser completamente você, sem filtro, sem audiência: o que aparece?',
      opcoes: [
        { texto: 'Medo de que as pessoas não gostem', emoji: '😨' },
        { texto: 'Dúvida se essa pessoa existe de verdade', emoji: '❔' },
        { texto: 'Não sei bem quem essa pessoa é', emoji: '🎭' },
        { texto: 'Desconforto com não saber o que vai acontecer', emoji: '🌊' }
      ]
    }
  ];

  var ARCHETYPES = ['aprovador', 'sabotador', 'ausente', 'controlador'];

  // ---------- Dados: os 4 resultados (copy da Ge; ajuste 22/07: rótulos no masculino
  // genérico = nome do código, não da pessoa; corpo sem marcação de gênero) ----------
  var RESULTS = {
    aprovador: {
      label: 'O Aprovador',
      img: 'badge-aprovador.webp',
      corpo: [
        'Você aprendeu cedo que agradar é mais seguro do que ser você.',
        'Então foi ajustando. A voz, os limites, as escolhas. Sempre com um olho no que os outros precisam de você. Sempre disponível. Sempre "tá bom."',
        'O resultado? Uma vida construída em torno da aprovação alheia. E um cansaço que nenhum descanso resolve, porque não é cansaço físico. É o cansaço de carregar uma versão sua que não é a sua.',
        'O material que você vai receber agora vai te mostrar exatamente quando e como esse código foi instalado. E por que não é fraqueza. É neurobiologia.'
      ]
    },
    sabotador: {
      label: 'O Sabotador',
      img: 'badge-sabotador.webp',
      corpo: [
        'Você deseja. Planeja. Começa. E na hora H, algo te puxa de volta.',
        'Não é falta de força de vontade. É um arquivo gravado no seu subconsciente que diz que você não merece chegar lá. Que sucesso é perigoso. Que se você se destacar demais, vai perder algo, ou alguém.',
        'Então você chega perto. E derruba.',
        'O material que você vai receber agora vai te mostrar a raiz exata desse código. Onde foi instalado, quem instalou, e por que seu cérebro ainda obedece ele.'
      ]
    },
    ausente: {

  var steps = Array.prototype.slice.call(document.querySelectorAll('[data-step]'));

  function updateProgress() {

    for (var i = 1; i <= QUESTIONS.length; i++) {
      var a = localStorage.getItem('quiz_answer_' + i);

      score[a]++;

    }
    var winner = null, best = -1;
    ARCHETYPES.forEach(function (arch) {
      if (score[arch] > best) { best = score[arch]; winner = arch; }
      else if (score[arch] === best) {
        // empate: vence quem apareceu primeiro entre as 8 respostas
        if (firstSeenAt[arch] < firstSeenAt[winner]) winner = arch;
      }
    });

  function runLoading() {
    var RING_CIRC = 339.292; // 2 * PI * r(54)

  // Captura: valida e-mail (formato + descartável + sugestão de typo), grava lead, envia pro backend
  (function setupCapture() {
    var EMAIL_RE = /^[a-zA-Z0-9.!#$%&'*+/=?^_`{|}~-]+@[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?(?:\.[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?)+$/;

      'mailinator.com':1,'guerrillamail.com':1,'guerrillamail.info':1,'guerrillamail.net':1,
      'sharklasers.com':1,'grr.la':1,'10minutemail.com':1,'10minutemail.net':1,'tempmail.com':1,
      'temp-mail.org':1,'tempmail.net':1,'throwawaymail.com':1,'yopmail.com':1,'yopmail.fr':1,
      'trashmail.com':1,'trashmail.net':1,'getnada.com':1,'maildrop.cc':1,'dispostable.com':1,
      'fakeinbox.com':1,'mailnesia.com':1,'mintemail.com':1,'mailcatch.com':1,'mohmal.com':1,
      'emailondeck.com':1,'spam4.me':1,'tempinbox.com':1,'moakt.com':1,'mailto.plus':1,
      '1secmail.com':1,'discard.email':1,'harakirimail.com':1,'tempr.email':1,'getairmail.com':1,
      'nada.email':1,'fakemail.net':1,'fakemailgenerator.com':1,'maileater.com':1,'inboxbear.com':1,
      'tmail.com':1,'mytemp.email':1,'burnermail.io':1,'33mail.com':1,'einrot.com':1
    };
    var POPULAR = [
      'gmail.com','hotmail.com','outlook.com','yahoo.com','yahoo.com.br','icloud.com',
      'live.com','bol.com.br','uol.com.br','terra.com.br','globo.com','ig.com.br',

    function levenshtein(a, b) {
      var m = a.length, n = b.length;
      if (!m) return n;
      if (!n) return m;
      var prev = [], cur = [], i, j;
      for (j = 0; j <= n; j++) prev[j] = j;
      for (i = 1; i <= m; i++) {
        cur[0] = i;
        for (j = 1; j <= n; j++) {
          var cost = a.charAt(i - 1) === b.charAt(j - 1) ? 0 : 1;
          cur[j] = Math.min(prev[j] + 1, cur[j - 1] + 1, prev[j - 1] + cost);
        }
        for (j = 0; j <= n; j++) prev[j] = cur[j];
      }
      return cur[n];

      if (at < 1) return null;
      var local = email.slice(0, at);

      var fix = suggest(email);
      if (fix) return { type: 'typo', suggestion: fix };
      return { type: 'ok' };

    var form = document.getElementById('captureForm');
    var emailInput = document.getElementById('capEmail');

      clearMsgs();
      localStorage.setItem('quiz_email', value);

      sending = true;
      var btn = document.getElementById('btnCapture');
      btn.textContent = 'Enviando...';

      var result = localStorage.getItem('quiz_result');
      fetch('/api/subscribe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: name,
          email: value,
          result: result,
          event_type: 'isca',
          offer: 'quiz-diagnostico',
          product: 'metodo-calice',
          utm_source: localStorage.getItem('quiz_utm_source') || '',
          utm_medium: localStorage.getItem('quiz_utm_medium') || '',
          utm_campaign: localStorage.getItem('quiz_utm_campaign') || '',
          utm_content: localStorage.getItem('quiz_utm_content') || 'geovana'
        })
      }).catch(function (err) {
        // fire-and-forget: não bloqueia a experiência se a rede falhar — o lead
        // ainda vê o resultado; o e-mail de reforço fica pendente até reenviar depois.
        console.error('Erro ao enviar o lead:', err);
      });

      window.__funnel.continue();
    });
  })();
})();
</script>
</body>
</html>
