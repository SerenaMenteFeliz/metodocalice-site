<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>O Código Invisível · Método Cálice</title>
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Jost:wght@400;500;600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  /* Tokens reais do tema "Santuário + Véu" — ver
     .claude/skills/quiz-funnel-designer/references/visual-identity-serena.md */
  :root {
    --veil-0: #fdfcfe;
    --veil-1: #faf6fb;
    --veil-2: #f7efe3;
    --ink: #453d57;
    --accent: #8a6d3e;
    --gold: #d9a854;
    --gold-soft: #e7c77a;
    --surface-dark-1: #2b1e42;
    --surface-dark-2: #4a2e63;
    --surface-dark-fg: #fbf6f0;
    --glass: rgba(255, 255, 255, .62);
    --glass-border: rgba(255, 255, 255, .9);
    --shadow-tint: rgba(155, 130, 200, .4);
    --font-display: 'Cormorant Garamond', Georgia, serif;
    --font-label: 'Jost', sans-serif;
    --font-ui: 'Manrope', -apple-system, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: var(--font-ui);
    color: var(--ink);
    background: linear-gradient(170deg, var(--veil-0) 0%, var(--veil-1) 55%, var(--veil-2) 100%);
    background-attachment: fixed;
    line-height: 1.68;
  }
  #app { min-height: 100vh; min-height: 100dvh; display: flex; flex-direction: column; }

  /* ---------- contador de páginas (fixo no topo, só nas páginas de leitura) ---------- */
  .progress-shell {
    position: fixed; top: 0; left: 0; right: 0; z-index: 10;
    padding: 16px 20px 14px;
    background: linear-gradient(170deg, var(--veil-0) 0%, var(--veil-1) 100%);
    transition: opacity .2s ease;
  }
  .progress-shell.is-hidden { opacity: 0; pointer-events: none; }
  .progress-inner { max-width: 620px; margin: 0 auto; }
  .progress-track {
    height: 6px; background: var(--glass); border: 1px solid var(--glass-border);
    border-bottom: 2px solid rgba(154, 130, 200, .38);
    border-radius: 999px; overflow: hidden;
  }
  .progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--gold), var(--gold-soft)); transition: width .3s ease; }
  .progress-count { font-family: var(--font-label); font-size: 12px; letter-spacing: .03em; color: var(--accent); margin: 8px 2px 0; display: flex; justify-content: space-between; }

  /* footer legal em fluxo normal (não fixo) — nas telas de leitura o scroll é da
     página inteira, footer fica no fim do conteúdo como numa página comum */
  .legal-footer {
    text-align: center; padding: 18px 20px 24px; margin-top: auto;
    font-family: var(--font-label); font-size: 11px; color: var(--ink); opacity: .5; letter-spacing: .01em;
  }

  #steps { flex: 1; display: flex; flex-direction: column; padding-top: 56px; }
  [data-step] { display: none; flex: 1; }
  [data-step].is-active { display: flex; }
  [data-step].is-enter { animation: step-in .45s cubic-bezier(.16,1,.3,1); }
  [data-step].is-leaving { opacity: 0; transition: opacity .16s ease; }
  @keyframes step-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @media (prefers-reduced-motion: reduce) {
    [data-step].is-enter { animation: none; }
    [data-step].is-leaving { transition: none; }
  }

  .wrap {
    width: 100%;
    max-width: 620px;
    margin: 0 auto;
    padding: 28px 22px 44px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    flex: 1;
  }
  /* páginas de leitura: conteúdo começa do topo, não centralizado verticalmente */
  .wrap-top { justify-content: flex-start; }
  .center { text-align: center; }

  /* ---------- mídia (moldura dourada = mídia finalizada) ---------- */
  .media-frame {
    max-width: 176px;
    margin: 0 auto 22px;
    padding: 5px;
    border: 1.5px dashed var(--gold);
    border-radius: 24px;
  }
  .media-frame img { display: block; width: 100%; border-radius: 20px; }
  .img-badge, .img-badge-small { aspect-ratio: 3/4; }
  .img-badge img, .img-badge-small img { height: 100%; object-fit: cover; }
  .img-badge { max-width: 216px; margin: 0 auto 26px; }
  .img-badge-small { max-width: 112px; margin: 26px auto 0; }

  .eyebrow {
    font-family: var(--font-label); font-size: 12px; font-weight: 600; letter-spacing: .07em;
    text-transform: uppercase; color: var(--accent); text-align: center; margin: 0 0 14px;
  }

  /* ---------- capa ---------- */
  .capa-title {
    font-family: var(--font-display); font-weight: 600; font-size: 36px; line-height: 1.14;
    color: var(--ink); text-align: center; margin: 0 0 8px;
  }
  .capa-sub {
    font-family: var(--font-display); font-style: italic; color: var(--accent);
    text-align: center; font-size: 17px; margin: 0 0 26px; opacity: .9;
  }

  /* ---------- resultado personalizado (cartão de contraste) ---------- */
  .opening-card {
    margin-bottom: 30px;
    padding: 24px 24px 8px;
    border-radius: 20px;
    background: linear-gradient(160deg, rgba(43,30,66,.94), rgba(74,46,99,.88));
    color: var(--surface-dark-fg);
    box-shadow: 0 20px 40px -22px var(--shadow-tint);
  }
  .opening-card p { font-size: 16px; margin: 0 0 16px; opacity: .94; }
  .opening-card p strong { color: var(--gold-soft); }

  .fallback-note {
    font-family: var(--font-label);
    font-size: 14px;
    color: var(--ink);
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 30px;
  }
  .fallback-note a { color: var(--accent); font-weight: 600; }

  /* ---------- índice ---------- */
  .toc-heading { font-family: var(--font-display); font-weight: 600; font-size: 30px; margin: 0 0 22px; text-align: center; }
  .toc-item {
    display: flex; align-items: center; gap: 14px;
    width: 100%; text-align: left;
    padding: 15px 16px; margin-bottom: 11px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    box-shadow: 0 8px 20px -16px var(--shadow-tint);
    font-family: var(--font-ui); color: var(--ink);
    cursor: pointer;
    transition: border-color .15s ease, transform .1s ease;
  }
  .toc-item:hover { border-color: var(--gold); }
  .toc-item:active { transform: scale(.98); }
  .toc-num { font-family: var(--font-display); font-weight: 600; font-size: 22px; color: var(--gold); flex: 0 0 30px; text-align: center; }
  .toc-body { flex: 1; min-width: 0; }
  .toc-meta { display: block; font-family: var(--font-label); font-size: 11.5px; letter-spacing: .04em; text-transform: uppercase; color: var(--accent); opacity: .85; }
  .toc-title { display: block; font-size: 15px; font-weight: 600; line-height: 1.35; }
  .toc-state { font-family: var(--font-label); font-size: 12px; color: var(--accent); flex: 0 0 auto; }
  .toc-item.is-done .toc-state { color: var(--gold); font-size: 16px; }
  .toc-item.is-current { border-color: var(--gold); }

  /* ---------- páginas de leitura ---------- */
  .page-topnav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 26px; }
  .page-topnav a {
    font-family: var(--font-label); font-size: 13px; color: var(--accent);
    opacity: .75; text-decoration: none; cursor: pointer;
  }
  .page-topnav a:hover { opacity: 1; }

  .cont-label {
    font-family: var(--font-label); font-size: 11.5px; letter-spacing: .06em;
    text-transform: uppercase; color: var(--accent); opacity: .8; margin: 0 0 14px;
  }

  h3.chapter-title { font-family: var(--font-display); font-weight: 500; font-size: 25px; color: var(--accent); margin: 0 0 20px; }
  p { font-family: var(--font-ui); font-size: 16px; margin: 0 0 16px; }
  em { font-style: italic; color: var(--accent); }

  /* capitular dourada só na primeira página de cada capítulo */
  .chapter-start > p:first-of-type::first-letter {
    font-family: var(--font-display);
    font-size: 2.8em;
    line-height: .75;
    float: left;
    padding: .06em .12em 0 0;
    color: var(--gold);
  }

  /* ---------- conclusão: momento visual próprio (santuário escuro) ---------- */
  .finale-card {
    position: relative;
    overflow: hidden;
    border-radius: 26px;
    padding: 38px 28px 34px;
    background: linear-gradient(165deg, var(--surface-dark-1), var(--surface-dark-2));
    color: var(--surface-dark-fg);
    box-shadow: 0 26px 52px -24px var(--shadow-tint);
    text-align: center;
  }
  .finale-card::before {
    content: '';
    position: absolute; inset: -40% -20% auto -20%; height: 70%;
    background: radial-gradient(circle, rgba(217,168,84,.22), transparent 65%);
    pointer-events: none;
  }
  .finale-eyebrow {
    font-family: var(--font-label); font-size: 12px; font-weight: 600; letter-spacing: .09em;
    text-transform: uppercase; color: var(--gold-soft); margin: 0 0 12px;
  }
  .finale-title {
    font-family: var(--font-display); font-weight: 600; font-size: 28px; line-height: 1.2;
    color: var(--surface-dark-fg); margin: 0 0 22px;
  }
  .finale-card p { color: var(--surface-dark-fg); opacity: .92; text-align: left; position: relative; }
  .finale-card p em { color: var(--gold-soft); }
  .finale-next {
    position: relative;
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(231,199,122,.35);
    border-radius: 16px;
    padding: 18px 18px 4px;
    margin: 22px 0 4px;
  }
  .signature {
    font-family: var(--font-display); font-style: italic; font-weight: 500; font-size: 22px;
    line-height: 1.4; margin: 26px 0 0; color: var(--gold-soft) !important; opacity: 1 !important;
    text-align: center !important;
  }
  .finale-card .img-badge-small { margin-top: 28px; border-color: var(--gold-soft); }
  .finale-links { margin-top: 26px; display: flex; flex-direction: column; align-items: center; gap: 12px; position: relative; }
  .finale-links a {
    font-family: var(--font-label); font-size: 13.5px; font-weight: 600;
    color: var(--gold-soft); text-decoration: underline; cursor: pointer;
  }

  /* ---------- navegação ---------- */
  .step-nav { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .btn {
    display: block; width: 100%; padding: 16px 20px; text-align: center;
    background: linear-gradient(160deg, var(--surface-dark-1), var(--surface-dark-2));
    color: var(--surface-dark-fg);
    font-family: var(--font-label); font-size: 15.5px; font-weight: 600; letter-spacing: .01em;
    border: 0; border-radius: 9999px; text-decoration: none; cursor: pointer; box-sizing: border-box;
    box-shadow: 0 12px 26px -14px var(--shadow-tint);
    transition: transform .12s ease, box-shadow .12s ease;
  }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 16px 30px -14px var(--shadow-tint); }
  .btn:active { transform: translateY(0) scale(.99); }
  .btn-narrow { width: auto; min-width: 250px; max-width: 340px; margin: 0 auto; }
  .btn-ghost {
    background: none; box-shadow: none; color: var(--accent);
    font-family: var(--font-label); font-size: 13.5px; font-weight: 600;
    border: 0; padding: 4px; cursor: pointer; text-decoration: underline;
  }
  .back-link {
    display: inline-block; font-family: var(--font-label); font-size: 13px;
    color: var(--accent); opacity: .75; text-decoration: none; margin-bottom: 24px; cursor: pointer;
  }
  .back-link:hover { opacity: 1; }

  @media (max-width: 380px) {
    .wrap { padding: 22px 16px 34px; }
    .capa-title { font-size: 29px; }
    h3.chapter-title { font-size: 21px; }
    .finale-title { font-size: 24px; }
    .finale-card { padding: 30px 20px 28px; }
    .img-badge { max-width: 172px; }
    .btn { padding: 14px 18px; font-size: 15px; }
  }
</style>
</head>
<body>
<div id="app">
  <div class="progress-shell" id="progressShell">
    <div class="progress-inner">
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      <p class="progress-count"><span id="progressSection"></span><span id="progressPage"></span></p>
    </div>
  </div>
  <div id="steps"></div>
  <footer class="legal-footer">Método Cálice · Política de Privacidade · Termos de Uso</footer>
</div>

<script>
(function () {
  'use strict';

  // ---------- Dados: os 4 resultados (copy da Ge; ajuste 22/07: rótulos no masculino
  // genérico = nome do código, não da pessoa; corpo sem marcação de gênero) ----------
  var RESULTS = {
    aprovador: {
      label: 'O Código do Aprovador',
      img: 'badge-aprovador.webp',
      corpo: [
        'Você aprendeu cedo que agradar é mais seguro do que ser você.',
        'Então foi ajustando. A voz, os limites, as escolhas. Sempre com um olho no que os outros precisam de você. Sempre disponível. Sempre "tá bom."',
        'O resultado? Uma vida construída em torno da aprovação alheia. E um cansaço que nenhum descanso resolve, porque não é cansaço físico. É o cansaço de carregar uma versão sua que não é a sua.',
        'O material a seguir vai te mostrar exatamente quando e como esse código foi instalado. E por que não é fraqueza. É neurobiologia.'
      ]
    },
    sabotador: {
      label: 'O Código do Sabotador',
      img: 'badge-sabotador.webp',
      corpo: [
        'Você deseja. Planeja. Começa. E na hora H, algo te puxa de volta.',
        'Não é falta de força de vontade. É um arquivo gravado no seu subconsciente que diz que você não merece chegar lá. Que sucesso é perigoso. Que se você se destacar demais, vai perder algo, ou alguém.',
        'Então você chega perto. E derruba.',
        'O material a seguir vai te mostrar a raiz exata desse código. Onde foi instalado, quem instalou, e por que seu cérebro ainda obedece ele.'
      ]
    },
    ausente: {
      label: 'O Código do Ausente',
      img: 'badge-ausente.webp',
      corpo: [
        'Você está presente em tudo. No trabalho, nas relações, nas obrigações.',
        'Mas ausente de si.',
        'Você vai, faz, cumpre. Funciona. Mas em algum ponto do caminho perdeu o fio de volta pra você. E agora quando alguém pergunta o que você quer, o que você sente, quem você é, a resposta demora mais do que deveria.',
        'O material a seguir vai te mostrar como essa desconexão aconteceu. E que ela não é quem você é. É o que te fizeram ser.'
      ]
    },
    controlador: {
      label: 'O Código do Controlador',
      img: 'badge-controlador.webp',
      corpo: [
        'Você aprendeu que o mundo não é seguro quando as coisas saem do seu controle.',
        'Então você planeja. Prevê. Organiza. Prepara pra todos os cenários possíveis. Às vezes parece que você está sempre a postos, mas nunca age de verdade.',
        'Por baixo do controle existe um medo muito antigo: o de que se você soltar, tudo desmorona. Que a segurança depende de você segurando tudo.',
        'O material a seguir vai te mostrar onde esse código nasceu. E o que acontece quando você descobre que pode soltar.'
      ]
    }
  };

  function getResult() {
    var q = new URLSearchParams(window.location.search);
    var fromUrl = q.get('r');
    if (fromUrl && RESULTS[fromUrl]) return fromUrl;
    try {
      var fromStorage = localStorage.getItem('quiz_result');
      if (fromStorage && RESULTS[fromStorage]) return fromStorage;
    } catch (_) {}
    return null;
  }

  var result = getResult();
  var name = '';
  try { name = localStorage.getItem('quiz_name') || ''; } catch (_) {}

  // ---------- Dados: conteúdo paginado (texto da Ge intacto, salvo ajustes de
  // gênero registrados na nota do projeto; só a divisão em páginas é nova) ----------
  var PAGES = [
    {
      sec: 'Introdução', tocTitle: 'Introdução', start: true,
      html:
        '<h3 class="chapter-title">Introdução</h3>' +
        '<div class="chapter-start">' +
        '<p>Você quer mudar. De verdade. Não é falta de vontade, não é preguiça, não é falta de informação.</p>' +
        '<p>Você já leu. Já tentou. Já começou de novo.</p>' +
        '<p>E mesmo assim, uma força que você não consegue ver te puxa de volta pro mesmo lugar. Mesma ansiedade. Mesmo teto. Mesma sensação de que algo fundamental está errado, mas você não sabe nomear o quê.</p>' +
        '<p>Eu vou te dizer o quê.</p>' +
        '<p>Antes de você ter idade pra questionar qualquer coisa, alguém já tinha decidido quem você ia ser. Não com má intenção, necessariamente. Mas com consequências que você carrega até hoje.</p>' +
        '<p>Esse material existe pra você ver o código. Porque você não pode reescrever o que não consegue enxergar.</p>' +
        '</div>'
    },
    {
      sec: 'Capítulo 1', tocTitle: 'Você Não Escolheu Quem Você É', start: true,
      html:
        '<h3 class="chapter-title">Capítulo 1: Você Não Escolheu Quem Você É</h3>' +
        '<div class="chapter-start">' +
        '<p>Do nascimento até os 7 anos, seu cérebro operava predominantemente em ondas Theta.</p>' +
        '<p>Na vida adulta, você só entra em Theta em hipnose profunda ou nos segundos antes de dormir: aquele momento em que você já não controla mais os pensamentos.</p>' +
        '<p>Quando criança, você vivia nesse estado o tempo todo.</p>' +
        '<p>O córtex pré-frontal, a parte do cérebro responsável por julgamento crítico, lógica e análise, ainda não funcionava. Você não tinha como dizer "isso não faz sentido." Não tinha filtro. Não tinha defesa.</p>' +
        '</div>'
    },
    {
      sec: 'Capítulo 1',
      html:
        '<p>Tudo que foi dito sobre você, mostrado pra você, sentido ao seu redor nessa fase foi gravado diretamente no subconsciente como verdade absoluta. Sem revisão. Sem questionamento. Sem sua permissão.</p>' +
        '<p>Seus pais, a televisão, a religião, as músicas, os adultos ao redor: todos escreveram no seu código antes que você soubesse ler.</p>' +
        '<p>Você não aprendeu a ser você. O que te formou foram os filtros de outras pessoas, que também foram formadas pelos filtros das pessoas delas.</p>' +
        '<p>E o mais silencioso nisso tudo: você cresceu achando que era sua personalidade.</p>'
    },
    {
      sec: 'Capítulo 2', tocTitle: 'A Escola Não Foi Feita Pra Você', start: true,
      html:
        '<h3 class="chapter-title">Capítulo 2: A Escola Não Foi Feita Pra Você</h3>' +
        '<div class="chapter-start">' +
        '<p>O modelo escolar que você conheceu não foi criado pra desenvolver quem você é.</p>' +
        '<p>Ele foi desenhado na Prússia do século XIX com um objetivo muito claro: produzir operários que cumprissem ordens, soldados que não questionassem, cidadãos que se encaixassem.</p>' +
        '<p>Não é teoria conspiratória. É história documentada.</p>' +
        '<p>E o mecanismo principal desse modelo era simples: reprimir a pergunta.</p>' +
        '<p>A criança que questionava demais era problema. Rotulada como difícil, rebelde, lenta. O que o subconsciente gravou com isso? <em>Se destacar é perigoso. Agradar a autoridade é sobreviver.</em></p>' +
        '</div>'
    },
    {
      sec: 'Capítulo 2',
      html:
        '<p>Você passou anos aprendendo fórmulas que nunca mais usou. Mas ninguém te ensinou como seu corpo funciona. Como suas emoções se movem. Como reconhecer o que é seu de verdade.</p>' +
        '<p>Fomos ensinados a buscar a cura fora: na caixinha, no especialista, no externo. A desconfiar do que o corpo sente. A calar o que não tem nome técnico.</p>' +
        '<p>A natureza cura em silêncio. O corpo sabe antes da mente. Mas isso não era útil pra um sistema que precisava de dependência.</p>'
    },
    {
      sec: 'Capítulo 3', tocTitle: 'O Cansaço Que Não Passa Com Descanso', start: true,
      html:
        '<h3 class="chapter-title">Capítulo 3: O Cansaço Que Não Passa Com Descanso</h3>' +
        '<div class="chapter-start">' +
        '<p>O resultado de tudo isso é uma geração de adultos que acordam, trabalham, cumprem e sentem um vazio que não sabem nomear.</p>' +
        '<p>Não é depressão necessariamente. Não é ingratidão. É desconexão.</p>' +
        '<p>Você tenta mudar. Decide, planeja, começa. E na hora H, algo te para. Procrastinação. Sabotagem. Um motivo que aparece do nada.</p>' +
        '<p>Isso tem uma explicação biológica.</p>' +
        '<p>Sua mente consciente, a que decide que quer mudar, representa cerca de 5% da atividade cerebral. Os outros 95% são subconscientes. E o que está gravado nesses 95%? O código dos 0 aos 7 anos. As crenças que entraram sem filtro: <em>não mereço, não sou capaz, é perigoso me destacar, dinheiro é escasso, sucesso isola.</em></p>' +
        '</div>'
    },
    {
      sec: 'Capítulo 3',
      html:
        '<p>Toda vez que você tenta avançar além do que foi programado como "seguro", o subconsciente ativa o freio. Não por maldade. Por proteção. Ele está te defendendo do desconhecido, mesmo que o desconhecido seja a sua própria liberdade.</p>' +
        '<p>Isso é autossabotagem. Não é fraqueza de caráter. É o seu código antigo cumprindo a função que foi instalada.</p>' +
        '<p>E tem uma imagem que nunca saiu da minha cabeça quando entendi isso:</p>' +
        '<p><em>Um cálice cheio até a borda com água que não é sua.</em></p>' +
        '<p>Você carrega. Oferece. Entorna. Recarrega de novo. E nunca para pra perguntar: alguém algum dia perguntou o que eu queria colocar nesse cálice?</p>'
    },
    {
      sec: 'Conclusão', tocTitle: 'O Que Vem Depois de Ver', start: true, finale: true,
      html:
        '<p>Entender o mecanismo não resolve tudo. Mas muda algo fundamental.</p>' +
        '<p>Você para de achar que o problema é você.</p>' +
        '<p>O problema é o código. E código pode ser reescrito.</p>' +
        '<p>Não com força de vontade. Não com mais disciplina. Mas acessando o subconsciente no estado certo, no momento certo, e instalando ali o que deveria ter sido instalado desde o início: a memória de quem você é antes de tudo que te ensinaram a ser.</p>' +
        '<div class="finale-next">' +
        '<p>Agora que você entende o mecanismo, o próximo passo é entender qual código específico está rodando em você, e você já sabe isso pelo seu resultado.</p>' +
        '<p>Nos próximos dias, eu vou te apresentar o Método Cálice: as ativações e meditações de reprogramação noturna criadas pra reescrever esse arquivo enquanto você dorme, direto na raiz onde tudo foi instalado.</p>' +
        '</div>'
    }
  ];

  // Seções derivadas das páginas (pro índice e pro contador)
  var SECTIONS = [];
  PAGES.forEach(function (p, i) {
    if (p.start) SECTIONS.push({ sec: p.sec, title: p.tocTitle, first: i, last: i, pages: 1 });
    else { var s = SECTIONS[SECTIONS.length - 1]; s.last = i; s.pages++; }
  });

  // ---------- Monta o DOM dos steps ----------
  // Índices: 0 = capa · 1 = resultado · 2 = índice · 3+ = páginas de leitura
  var PAGE_OFFSET = 3;
  var stepsEl = document.getElementById('steps');
  function el(html) {
    var d = document.createElement('div');
    d.innerHTML = html.trim();
    return d.firstElementChild;
  }

  // Step 0 — capa: simples e de impacto (título serifado escuro acima da badge)
  var capaTitle = result ? RESULTS[result].label : 'O Código Invisível';
  var capaEyebrow = result ? 'O Código Invisível · Método Cálice' : 'Método Cálice';
  stepsEl.appendChild(el(
    '<div data-step data-kind="capa">' +
      '<div class="wrap center">' +
        '<p class="eyebrow">' + capaEyebrow + '</p>' +
        '<h1 class="capa-title">' + capaTitle + '</h1>' +
        '<p class="capa-sub">Como sua mente foi programada antes dos 7 anos, e o que fazer agora.</p>' +
        (result ? '<div class="media-frame img-badge"><img src="../assets/img/' + RESULTS[result].img + '" alt="" /></div>' : '') +
        '<div class="step-nav">' +
          '<button type="button" class="btn btn-narrow" id="btnOpeningCta">Começar a leitura</button>' +
          '<button type="button" class="btn-ghost" id="btnRestart" style="display:none;">Recomeçar do início</button>' +
        '</div>' +
      '</div>' +
    '</div>'
  ));

  // Step 1 — resultado: o texto personalizado, agora com tela própria
  var resultadoHtml = result
    ? '<p class="eyebrow">Seu resultado</p>' +
      '<div class="opening-card">' +
        (name ? '<p><strong>' + name + '</strong>, aqui está o que descobrimos.</p>' : '') +
        RESULTS[result].corpo.map(function (p) { return '<p>' + p + '</p>'; }).join('') +
      '</div>'
    : '<div class="fallback-note">Não conseguimos identificar seu resultado específico do quiz, mas o conteúdo vale igual. Se quiser ver seu padrão personalizado, <a href="/quiz">refaça o diagnóstico aqui</a>.</div>';

  stepsEl.appendChild(el(
    '<div data-step data-kind="resultado">' +
      '<div class="wrap">' +
        '<a class="back-link" data-goto="0">&lsaquo; Voltar</a>' +
        resultadoHtml +
        '<div class="step-nav"><button type="button" class="btn btn-narrow" data-goto="2">Continuar</button></div>' +
      '</div>' +
    '</div>'
  ));

  // Step 2 — índice (estado das seções é re-renderizado sempre que a tela abre)
  stepsEl.appendChild(el(
    '<div data-step data-kind="toc">' +
      '<div class="wrap">' +
        '<a class="back-link" data-goto="1">&lsaquo; Voltar</a>' +
        '<p class="eyebrow">O Código Invisível</p>' +
        '<h2 class="toc-heading">Índice</h2>' +
        '<div id="tocList"></div>' +
        '<div class="step-nav"><button type="button" class="btn btn-narrow" id="btnTocContinue">Começar a leitura</button></div>' +
      '</div>' +
    '</div>'
  ));

  // Steps 3+ — páginas de leitura (conclusão tem tratamento visual próprio)
  PAGES.forEach(function (p, i) {
    var stepIdx = PAGE_OFFSET + i;
    var isLast = i === PAGES.length - 1;
    var topnav =
      '<div class="page-topnav">' +
        '<a data-goto="' + (stepIdx - 1) + '">&lsaquo; Voltar</a>' +
        '<a data-goto="2">Índice</a>' +
      '</div>';
    var body;
    if (p.finale) {
      body =
        '<div class="finale-card">' +
          '<p class="finale-eyebrow">Conclusão</p>' +
          '<h3 class="finale-title">O Que Vem Depois de Ver</h3>' +
          p.html +
          '<p class="signature">O código foi escrito sem a sua permissão.<br />Reescrevê-lo é um ato de soberania. 🍷</p>' +
          (result ? '<div class="media-frame img-badge-small"><img src="../assets/img/' + RESULTS[result].img + '" alt="" /></div>' : '') +
          '<div class="finale-links">' +
            '<a data-goto="2">Voltar ao índice</a>' +
          '</div>' +
        '</div>';
    } else {
      var nextIsFinale = PAGES[i + 1] && PAGES[i + 1].finale;
      body =
        (p.start ? '' : '<p class="cont-label">' + p.sec + ' · continuação</p>') +
        p.html +
        '<div class="step-nav"><button type="button" class="btn btn-narrow" data-goto="' + (stepIdx + 1) + '">' +
          (nextIsFinale ? 'Ver a conclusão' : 'Continuar lendo') +
        '</button></div>';
    }
    stepsEl.appendChild(el(
      '<div data-step data-kind="page" data-page="' + i + '">' +
        '<div class="wrap wrap-top">' + topnav + body + '</div>' +
      '</div>'
    ));
  });

  // ---------- Runtime de navegação ----------
  var steps = Array.prototype.slice.call(document.querySelectorAll('[data-step]'));
  var LAST_STEP = steps.length - 1;
  // chave nova (v2): os índices mudaram com a repaginação, progresso salvo no
  // formato antigo apontaria pra página errada
  var FURTHEST_KEY = 'material_furthest_v2';
  var idx = 0;

  function getFurthest() {
    try {
      var v = parseInt(localStorage.getItem(FURTHEST_KEY), 10);
      if (!isNaN(v) && v >= PAGE_OFFSET && v <= LAST_STEP) return v;
    } catch (_) {}
    return 0;
  }
  function markFurthest(i) {
    try {
      if (i >= PAGE_OFFSET && i > getFurthest()) localStorage.setItem(FURTHEST_KEY, String(i));
    } catch (_) {}
  }

  function updateProgress() {
    var shell = document.getElementById('progressShell');
    var current = steps[idx];
    var isPage = current.dataset.kind === 'page';
    shell.classList.toggle('is-hidden', !isPage);
    if (isPage) {
      var pageIdx = Number(current.dataset.page);
      document.getElementById('progressFill').style.width = (((pageIdx + 1) / PAGES.length) * 100) + '%';
      document.getElementById('progressSection').textContent = PAGES[pageIdx].sec;
      document.getElementById('progressPage').textContent = 'Página ' + (pageIdx + 1) + ' de ' + PAGES.length;
    }
  }

  function renderToc() {
    var furthest = getFurthest();
    var furthestPage = furthest ? furthest - PAGE_OFFSET : -1;
    var list = document.getElementById('tocList');
    list.innerHTML = '';
    SECTIONS.forEach(function (s, si) {
      var stateCls = '', stateTxt = s.pages + (s.pages > 1 ? ' páginas' : ' página');
      if (furthestPage >= s.last && (furthest === LAST_STEP || furthestPage > s.last)) {
        stateCls = 'is-done'; stateTxt = '✓';
      } else if (furthestPage >= s.first && furthestPage <= s.last) {
        stateCls = 'is-current'; stateTxt = 'em leitura';
      }
      var num = ('0' + (si + 1)).slice(-2);
      list.appendChild(el(
        '<button type="button" class="toc-item ' + stateCls + '" data-goto="' + (PAGE_OFFSET + s.first) + '">' +
          '<span class="toc-num">' + num + '</span>' +
          '<span class="toc-body">' +
            '<span class="toc-meta">' + s.sec + '</span>' +
            '<span class="toc-title">' + s.title + '</span>' +
          '</span>' +
          '<span class="toc-state">' + stateTxt + '</span>' +
        '</button>'
      ));
    });
    var cont = document.getElementById('btnTocContinue');
    if (furthest === LAST_STEP) { cont.textContent = 'Reler o material'; cont.dataset.goto = String(PAGE_OFFSET); }
    else if (furthest > 0) { cont.textContent = 'Continuar de onde parei'; cont.dataset.goto = String(furthest); }
    else { cont.textContent = 'Começar a leitura'; cont.dataset.goto = String(PAGE_OFFSET); }
  }

  function render() {
    steps.forEach(function (s, i) { s.classList.toggle('is-active', i === idx); s.classList.toggle('is-enter', i === idx); });
    if (idx === 2) renderToc();
    updateProgress();
    window.scrollTo(0, 0);
  }

  var TRANSITION_MS = 160;
  function goToStep(newIdx) {
    var current = steps[idx];
    current.classList.remove('is-enter');
    current.classList.add('is-leaving');
    setTimeout(function () {
      current.classList.remove('is-active', 'is-leaving');
      idx = newIdx;
      markFurthest(idx);
      var next = steps[idx];
      next.classList.add('is-active', 'is-enter');
      if (idx === 2) renderToc();
      updateProgress();
      window.scrollTo(0, 0);
    }, TRANSITION_MS);
  }

  // Capa: CTA se adapta ao progresso salvo; a capa sempre abre primeiro
  // (reorienta com a personalização a cada visita), só o botão muda
  (function setupOpening() {
    var saved = getFurthest();
    var cta = document.getElementById('btnOpeningCta');
    var restartBtn = document.getElementById('btnRestart');
    if (saved === LAST_STEP) {
      cta.textContent = 'Reler o material';
      cta.addEventListener('click', function () { goToStep(2); });
    } else if (saved > 0) {
      cta.textContent = 'Continuar de onde parei (' + PAGES[saved - PAGE_OFFSET].sec + ')';
      cta.addEventListener('click', function () { goToStep(saved); });
    } else {
      cta.addEventListener('click', function () { goToStep(1); });
    }
    if (saved > 0) {
      restartBtn.style.display = 'inline';
      restartBtn.addEventListener('click', function () {
        try { localStorage.removeItem(FURTHEST_KEY); } catch (_) {}
        goToStep(1);
      });
    }
  })();

  stepsEl.addEventListener('click', function (e) {
    var target = e.target.closest('[data-goto]');
    if (target) goToStep(Number(target.dataset.goto));
  });

  render();
})();
</script>
</body>
</html>
